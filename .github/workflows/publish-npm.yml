name: Publish @antonytm/mcp-sitecore-server to NPM registry
on:
  release:
    types: [created]
permissions:
  id-token: write
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Upgrade npm (required for OIDC trusted publishing)
        run: npm install -g npm@latest
      - name: Install dependencies
        working-directory: .
        run: npm install
      - name: Build package
        working-directory: .
        run: npm run build
      - name: Bundle package
        working-directory: .
        run: npm run bundle
      - name: Publish package on NPM 📦
        working-directory: .
        run: npm publish --provenance --access public